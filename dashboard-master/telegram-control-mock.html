<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ENGREMIAT · Telegram Mock Control</title>
<style>
body{margin:0;background:#07111f;color:#e5e7eb;font-family:Arial,Helvetica,sans-serif}
header{background:#020617;border-bottom:1px solid #334155;padding:16px}
main{display:grid;grid-template-columns:420px 1fr;gap:16px;padding:16px}
.card{background:#0f172a;border:1px solid #334155;border-radius:14px;padding:14px;margin:12px 0}
.phone{max-width:390px;background:#111827;border:1px solid #475569;border-radius:28px;padding:18px;margin:auto}
.screen{background:#020617;border-radius:20px;padding:12px;min-height:620px}
.bubble{background:#1f2937;border:1px solid #475569;border-radius:14px;padding:12px;margin:10px 0}
.bubble h3{margin:0 0 8px 0}.pill{display:inline-block;background:#0b1220;border:1px solid #475569;border-radius:999px;padding:5px 9px;margin:3px;font-size:12px}
button{background:#1d4ed8;color:white;border:0;border-radius:10px;padding:8px 11px;margin:4px;cursor:pointer}
button.alt{background:#374151}button.warn{background:#92400e}button.bad{background:#991b1b}
textarea,pre{width:100%;min-height:230px;background:#020617;color:#e5e7eb;border:1px solid #334155;border-radius:10px;padding:10px;white-space:pre-wrap;box-sizing:border-box}
.ok{color:#86efac}.warnText{color:#facc15}.badText{color:#fca5a5}
@media(max-width:900px){main{grid-template-columns:1fr}.phone{max-width:100%}}
</style>
</head>
<body>
<header>
<h1>ENGREMIAT · Telegram Mock Control</h1>
<div>proposal-only · token_required_now:false · telegram_actions_executed:false · external_actions:false</div>
</header>
<main>
<aside>
<div class="card"><h2>Estado mock</h2><div id="stateBox">Cargando...</div></div>
<div class="card"><h2>Acciones simuladas</h2>
<button onclick="selectKind('status')">Estado</button>
<button onclick="selectKind('next_phase')">Siguiente fase</button>
<button onclick="selectKind('blockers')">Bloqueos</button>
<button onclick="selectKind('authorization_request')">Autorización</button>
</div>
<div class="card"><h2>Payload para ChatGPT/operador</h2><textarea id="payloadBox"></textarea><button onclick="copyPayload()">Copiar payload</button><div id="copyBox"><span class="pill">manual_copy_only</span></div></div>
</aside>
<section>
<div class="phone"><div class="screen"><h2>Telegram · mock</h2><div id="messagesBox">Cargando...</div></div></div>
<div class="card"><h2>Filtro humano</h2><textarea id="humanContext" placeholder="Contexto humano antes de continuar..."></textarea><button onclick="preparePayload('human_context')">Actualizar payload</button></div>
<div class="card"><h2>Raw</h2><pre id="rawBox"></pre></div>
</section>
</main>
<script>
const files={mockState:"data/telegram-control-mock-state.json",messages:"data/telegram-control-mock-messages.json",telegramState:"data/telegram-control-state.json",telegramQueue:"../queues/telegram-control-work-queue.json",globalState:"data/global-control-panel-state.json",globalQueue:"../queues/global-development-work-queue.json"};let DATA={},selectedKind="status";
async function j(p){const r=await fetch(p+"?t="+Date.now());if(!r.ok)throw new Error(p+" "+r.status);return await r.json()}
function e(x){return String(x??"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[m]))}
function selectKind(k){selectedKind=k;render();preparePayload("selected_"+k)}
function selectedMessage(){const arr=(DATA.messages&&DATA.messages.messages)||[];return arr.find(x=>x.kind===selectedKind)||arr[0]||{}}
function preparePayload(reason){const msg=selectedMessage();const ctx=document.getElementById("humanContext")?document.getElementById("humanContext").value:"";const payload={type:"ENGREMIAT_TELEGRAM_MOCK_TO_CHATGPT_OPERATOR_PAYLOAD",generated_at:new Date().toISOString(),reason:reason,mode:"proposal_only",token_required_now:false,telegram_send_allowed:false,telegram_actions_executed:false,selected_message:msg,telegram_active_item:(DATA.telegramQueue||{}).active_item,global_next:(DATA.globalState||{}).next_recommended_action,human_context:ctx,instruction_to_chatgpt:"Continuamos desde Telegram mock. Genera bloque PowerShell completo, sin token, sin envío real, sin Git ni acciones externas."};document.getElementById("payloadBox").value=JSON.stringify(payload,null,2)}
async function copyPayload(){try{await navigator.clipboard.writeText(document.getElementById("payloadBox").value);document.getElementById("copyBox").innerHTML="<span class=\"pill\">payload_copiado</span>"}catch(err){document.getElementById("copyBox").innerHTML="<span class=\"pill\">copia_manual_requerida</span>"}}
function render(){const s=DATA.mockState||{},msgs=(DATA.messages&&DATA.messages.messages)||[];document.getElementById("stateBox").innerHTML=`<p><span class="pill">status=${e(s.status)}</span></p><p><span class="pill">token=${e(s.token_required_now)}</span></p><p><span class="pill">telegram_actions=${e(s.telegram_actions_executed)}</span></p><p><span class="pill">next=${e(s.next_recommended_action)}</span></p>`;document.getElementById("messagesBox").innerHTML=msgs.map(m=>`<div class="bubble"><h3>${e(m.title)}</h3><p>${e(m.body)}</p><p>${(m.buttons||[]).map(b=>`<button class="alt" onclick="selectKind('${e(m.kind)}')">${e(b)}</button>`).join("")}</p><span class="pill">${e(m.kind)}</span></div>`).join("");document.getElementById("rawBox").textContent=JSON.stringify({mockState:DATA.mockState,telegramQueue:(DATA.telegramQueue||{}).active_item,selected:selectedMessage()},null,2)}
async function load(){try{DATA.mockState=await j(files.mockState);DATA.messages=await j(files.messages);DATA.telegramState=await j(files.telegramState);DATA.telegramQueue=await j(files.telegramQueue);DATA.globalState=await j(files.globalState);DATA.globalQueue=await j(files.globalQueue);render();preparePayload("auto_refresh")}catch(err){document.getElementById("stateBox").textContent=err.message}}
load();setInterval(load,5000);
</script>
</body></html>
